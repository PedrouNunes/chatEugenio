<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Eugénio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app {
            width: 700px;
            height: 88vh;
            background: #1a1a2e;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2a4a;
        }

        #header {
            padding: 16px 20px;
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        #agent-name {
            color: #e2e8f0;
            font-weight: 600;
            font-size: 16px;
        }

        #agent-status {
            color: #64748b;
            font-size: 12px;
        }

        #mode-toggle {
            display: flex;
            background: #0f0f1a;
            border-radius: 8px;
            padding: 4px;
            gap: 4px;
        }

        .mode-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            background: transparent;
            color: #64748b;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        #memory-bar {
            padding: 8px 20px;
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #64748b;
        }

        #memory-toggle {
            position: relative;
            width: 36px;
            height: 20px;
            background: #2a2a4a;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
        }

        #memory-toggle.on {
            background: #6366f1;
        }

        #memory-toggle::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: left 0.2s;
        }

        #memory-toggle.on::after {
            left: 19px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: #2a2a4a transparent;
        }

        .message-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-group.user {
            align-items: flex-end;
        }

        .message-group.agent {
            align-items: flex-start;
        }

        .message-label {
            font-size: 11px;
            color: #475569;
            padding: 0 4px;
        }

        .bubble {
            max-width: 78%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .bubble {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-bottom-right-radius: 3px;
        }

        .agent .bubble {
            background: #16213e;
            color: #cbd5e1;
            border: 1px solid #2a2a4a;
            border-bottom-left-radius: 3px;
        }

        .loading .bubble {
            background: #16213e;
            color: #475569;
            border: 1px solid #2a2a4a;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-badge {
            display: inline-block;
            background: #0f172a;
            border: 1px solid #334155;
            color: #94a3b8;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            margin-top: 6px;
        }

        .elapsed-badge {
            display: inline-block;
            background: #0f172a;
            border: 1px solid #1e293b;
            color: #475569;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            margin-top: 4px;
            margin-left: 4px;
        }

        .dots::after {
            content: '';
            animation: dots 1.2s infinite;
        }

        @keyframes dots {
            0% {
                content: '';
            }

            33% {
                content: '.';
            }

            66% {
                content: '..';
            }

            100% {
                content: '...';
            }
        }

        #input-area {
            padding: 16px 20px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 10px;
            background: #16213e;
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #user-input:focus {
            border-color: #6366f1;
        }

        #user-input::placeholder {
            color: #334155;
        }

        #send-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: opacity 0.2s;
        }

        #send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div id="app">

        <div id="header">
            <div id="header-left">
                <div id="avatar">🤖</div>
                <div>
                    <div id="agent-name">Eugénio</div>
                    <div id="agent-status">Online</div>
                </div>
            </div>
            <div id="mode-toggle">
                <button class="mode-btn active" onclick="setMode('simple', this)">Simple</button>
                <button class="mode-btn" onclick="setMode('alfred', this)">Alfred</button>
                <button class="mode-btn" onclick="setMode('keyboard', this)">⌨️ Teclado</button>
            </div>
        </div>

        <div id="memory-bar">
            <button id="memory-toggle" onclick="toggleMemory()"></button>
            <span id="memory-label">Memória desligada — cada mensagem é independente</span>
        </div>

        <div id="messages">
            <div class="message-group agent">
                <div class="message-label">Eugénio</div>
                <div class="bubble">Olá! Sou o Eugénio, como posso ajudar? 👋</div>
            </div>
        </div>

        <<div id="input-area">
            <input id="file-input" type="file" accept=".tec" style="display:none" onchange="handleFileUpload(event)" />
            <button id="upload-btn" onclick="document.getElementById('file-input').click()"
                title="Carregar teclado .tec"
                style="background:#1a1a2e;border:1px solid #2a2a4a;color:#6366f1;padding:12px 14px;border-radius:10px;cursor:pointer;font-size:16px;">
                📂
            </button>
            <input id="user-input" type="text" placeholder="Escreve a tua mensagem..." />
            <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>

    </div>

    <script>
        let currentMode = 'simple';
        let memoryOn = false;

        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const agentName = document.getElementById('agent-name');
        const avatar = document.getElementById('avatar');

        function setMode(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            if (mode === 'alfred') {
                agentName.textContent = 'Eugénio — Alfred';
                avatar.textContent = '';
            } else if (mode === 'keyboard') {
                agentName.textContent = 'Eugénio — Teclado AAC';
                avatar.textContent = '⌨️';
            } else {
                agentName.textContent = 'Eugénio';
                avatar.textContent = '';
            }

            addSystemMessage(`Modo alterado para ${mode === 'alfred' ? 'Alfred' :
                mode === 'keyboard' ? '⌨️ Teclado AAC' :
                    '⚡ Simple'
                }`);

            if (mode === 'keyboard') {
                addMessage(
                    'Olá! Descreve o teclado que queres criar.\n\nExemplo:\n"Quero um teclado simples com as vogais A E I O U e um botão de apagar."\n\nVou gerar o ficheiro .tec para importares no Eugénio! 🎹',
                    'agent'
                );
            }
        }

        function toggleMemory() {
            memoryOn = !memoryOn;
            const toggle = document.getElementById('memory-toggle');
            const label = document.getElementById('memory-label');
            toggle.classList.toggle('on', memoryOn);
            label.textContent = memoryOn
                ? 'Memória ligada — o Eugénio lembra-se da conversa'
                : 'Memória desligada — cada mensagem é independente';
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.style.cssText = 'text-align:center;font-size:11px;color:#334155;padding:4px 0;';
            div.textContent = text;
            messagesDiv.appendChild(div);
            scroll();
        }

        function addMessage(text, role, elapsed) {
            const group = document.createElement('div');
            group.className = `message-group ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'Tu' : (currentMode === 'alfred' ? '🎩 Eugénio' : '🤖 Eugénio');

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            group.appendChild(label);
            group.appendChild(bubble);

            if (elapsed !== undefined && role === 'agent') {
                const badges = document.createElement('div');

                const modeBadge = document.createElement('span');
                modeBadge.className = 'tool-badge';
                modeBadge.textContent = currentMode === 'alfred' ? ' Alfred mode' : ' Simple mode';

                const timeBadge = document.createElement('span');
                timeBadge.className = 'elapsed-badge';
                timeBadge.textContent = `⏱ ${elapsed}s`;

                badges.appendChild(modeBadge);
                badges.appendChild(timeBadge);
                group.appendChild(badges);
            }

            messagesDiv.appendChild(group);
            scroll();
            return group;
        }

        function addLoading() {
            const group = document.createElement('div');
            group.className = 'message-group agent loading';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = `<span>Eugénio está a pensar</span><span class="dots"></span>`;

            group.appendChild(bubble);
            messagesDiv.appendChild(group);
            scroll();
            return group;
        }

        function scroll() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        let uploadedKeyboard = null;

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                uploadedKeyboard = e.target.result;
                addSystemMessage(`📂 Teclado "${file.name}" carregado como referência`);
                if (currentMode !== 'keyboard') {
                    // muda automaticamente para modo teclado
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.mode-btn')[2].classList.add('active');
                    currentMode = 'keyboard';
                    agentName.textContent = 'Eugénio — Teclado AAC';
                    avatar.textContent = '⌨️';
                }
                addMessage(
                    `Teclado carregado! Agora descreve o que queres criar com base nele.\n\nEx: "Cria um teclado igual mas só com as letras A B C D E"`,
                    'agent'
                );
            };
            reader.readAsText(file, 'latin1');
        }
        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';
            btn.disabled = true;

            const loading = addLoading();

            try {
                if (currentMode === 'keyboard') {
                    // Modo teclado — gera ficheiro .tec para download
                    const res = await fetch('http://localhost:8000/keyboard', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            description: message,
                            reference_keyboard: uploadedKeyboard || ""
                        })
                    });

                    const elapsed = res.headers.get('X-Elapsed-Seconds');
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);

                    loading.remove();
                    addMessage('✅ Teclado gerado com sucesso! Clica para fazer download:', 'agent', elapsed);

                    // Botão de download
                    const group = document.createElement('div');
                    group.className = 'message-group agent';
                    const btn2 = document.createElement('a');
                    btn2.href = url;
                    btn2.download = 'teclado.tec';
                    btn2.style.cssText = `
        display: inline-block;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 14px;
        margin-top: 4px;
      `;
                    btn2.textContent = '⬇️ Download teclado.tec';
                    group.appendChild(btn2);
                    messagesDiv.appendChild(group);
                    scroll();

                } else {
                    // Modos Simple e Alfred — resposta normal
                    const endpoint = currentMode === 'alfred'
                        ? 'http://localhost:8000/alfred'
                        : 'http://localhost:8000/chat';

                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message, reset: !memoryOn })
                    });

                    const data = await res.json();
                    loading.remove();
                    addMessage(data.response, 'agent', data.elapsed_seconds);
                }
            } catch (err) {
                loading.remove();
                addMessage('Erro ao contactar o servidor.', 'agent');
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
