<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Eugénio — Teclado AAC</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app {
            width: 700px;
            height: 88vh;
            background: #1a1a2e;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2a4a;
        }

        #header {
            padding: 16px 20px;
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        #agent-name {
            color: #e2e8f0;
            font-weight: 600;
            font-size: 16px;
        }

        #agent-status {
            color: #64748b;
            font-size: 12px;
        }

        #offline-badge {
            font-size: 11px;
            background: #0f172a;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 3px 10px;
            border-radius: 20px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: #2a2a4a transparent;
        }

        .message-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-group.user {
            align-items: flex-end;
        }

        .message-group.agent {
            align-items: flex-start;
        }

        .message-label {
            font-size: 11px;
            color: #475569;
            padding: 0 4px;
        }

        .bubble {
            max-width: 78%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .bubble {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-bottom-right-radius: 3px;
        }

        .agent .bubble {
            background: #16213e;
            color: #cbd5e1;
            border: 1px solid #2a2a4a;
            border-bottom-left-radius: 3px;
        }

        .loading .bubble {
            background: #16213e;
            color: #475569;
            border: 1px solid #2a2a4a;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .elapsed-badge {
            display: inline-block;
            background: #0f172a;
            border: 1px solid #1e293b;
            color: #475569;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            margin-top: 4px;
        }

        .dots::after {
            content: '';
            animation: dots 1.2s infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            33%  { content: '.'; }
            66%  { content: '..'; }
            100% { content: '...'; }
        }

        #input-area {
            padding: 16px 20px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 10px;
            background: #16213e;
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #user-input:focus {
            border-color: #6366f1;
        }

        #user-input::placeholder {
            color: #334155;
        }

        #send-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: opacity 0.2s;
        }

        #send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div id="app">

        <div id="header">
            <div id="header-left">
                <div id="avatar">⌨️</div>
                <div>
                    <div id="agent-name">Eugénio — Teclado AAC</div>
                    <div id="agent-status">Offline</div>
                </div>
            </div>
            <div id="offline-badge">🦙 Llama · Local</div>
        </div>

        <div id="messages">
            <div class="message-group agent">
                <div class="message-label">⌨️ Eugénio</div>
                <div class="bubble">Olá! Descreve o teclado que queres criar.

Exemplo:
"Quero um teclado simples com as vogais A E I O U e um botão de apagar."

Vou gerar o ficheiro .tec para importares no Eugénio! 🎹</div>
            </div>
        </div>

        <div id="input-area">
            <input id="file-input" type="file" accept=".tec" style="display:none" onchange="handleFileUpload(event)" />
            <button onclick="document.getElementById('file-input').click()"
                title="Carregar teclado .tec de referência"
                style="background:#1a1a2e;border:1px solid #2a2a4a;color:#6366f1;padding:12px 14px;border-radius:10px;cursor:pointer;font-size:16px;">
                📂
            </button>
            <input id="user-input" type="text" placeholder="Descreve o teclado que queres criar..." />
            <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>

    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        let uploadedKeyboard = null;

        function addMessage(text, role, elapsed) {
            const group = document.createElement('div');
            group.className = `message-group ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'Tu' : '⌨️ Eugénio';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            group.appendChild(label);
            group.appendChild(bubble);

            if (elapsed !== undefined && role === 'agent') {
                const badge = document.createElement('span');
                badge.className = 'elapsed-badge';
                badge.textContent = `⏱ ${elapsed}s`;
                group.appendChild(badge);
            }

            messagesDiv.appendChild(group);
            scroll();
            return group;
        }

        function addLoading() {
            const group = document.createElement('div');
            group.className = 'message-group agent loading';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = `<span>Eugénio está a gerar o teclado</span><span class="dots"></span>`;

            group.appendChild(bubble);
            messagesDiv.appendChild(group);
            scroll();
            return group;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.style.cssText = 'text-align:center;font-size:11px;color:#334155;padding:4px 0;';
            div.textContent = text;
            messagesDiv.appendChild(div);
            scroll();
        }

        function scroll() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                uploadedKeyboard = e.target.result;
                addSystemMessage(`📂 Teclado "${file.name}" carregado como referência`);
                addMessage(
                    `Teclado carregado! Agora descreve o que queres criar com base nele.\n\nEx: "Cria um teclado igual mas só com as letras A B C D E"`,
                    'agent'
                );
            };
            reader.readAsText(file, 'latin1');
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';
            btn.disabled = true;

            const loading = addLoading();

            try {
                const res = await fetch('http://localhost:8000/keyboard', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        description: message,
                        reference_keyboard: uploadedKeyboard || ""
                    })
                });

                const elapsed = res.headers.get('X-Elapsed-Seconds');
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);

                loading.remove();
                addMessage('✅ Teclado gerado com sucesso! Clica para fazer download:', 'agent', elapsed);

                const group = document.createElement('div');
                group.className = 'message-group agent';
                const link = document.createElement('a');
                link.href = url;
                link.download = 'teclado.tec';
                link.style.cssText = `
                    display: inline-block;
                    background: linear-gradient(135deg, #6366f1, #8b5cf6);
                    color: white;
                    padding: 10px 20px;
                    border-radius: 8px;
                    text-decoration: none;
                    font-size: 14px;
                    margin-top: 4px;
                `;
                link.textContent = '⬇️ Download teclado.tec';
                group.appendChild(link);
                messagesDiv.appendChild(group);
                scroll();

            } catch (err) {
                loading.remove();
                addMessage('Erro ao contactar o servidor. Verifica se o Ollama está ativo e o servidor está a correr.', 'agent');
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
